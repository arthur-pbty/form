services:
  formcraft:
    build:
      context: .
      dockerfile: Dockerfile
    image: formcraft
    container_name: formcraft
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - formcraft_data:/app/data
    restart: unless-stopped

volumes:
  formcraft_data:
